<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTDS常见问题自查助手 - 解决方案</title>
    
    <!-- 性能优化：提前建立与Render API的连接 -->
    <link rel="preconnect" href="https://qa-platform-1-zat2.onrender.com">
    <link rel="dns-prefetch" href="https://qa-platform-1-zat2.onrender.com">
    
    <style>
        :root {
            --color-primary: #7A5D38;
            --color-primary-light: #9A7B53;
            --color-primary-dark: #5D4528;
            --color-secondary: #1F2937;
            --color-accent: #D4AF37;
            --color-success: #10B981;
            --color-bg-primary: #F5F3EF;
            --color-bg-secondary: #FFFFFF;
            --color-text-primary: #1F2937;
            --color-text-secondary: #4B5563;
            --color-text-tertiary: #6B7280;
            --color-border: #E5E7EB;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 12px rgba(122, 93, 56, 0.08);
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --font-family-base: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            --font-size-sm: 14px;
            --font-size-base: 16px;
            --font-size-lg: 18px;
            --font-size-xl: 22px;
            --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
            --hover-card-bg: #FFF8ED;
            --hover-button-bg: #FFF8ED;
            --hover-link-bg: #FFF8ED;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family-base);
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            min-height: 100vh;
        }

        .main-container {
            max-width: 900px;
            margin: 0 auto;
            padding: var(--spacing-lg);
            padding-top: var(--spacing-xl);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(122, 93, 56, 0.15);
        }

        .logo-text {
            font-size: var(--font-size-lg);
            font-weight: 600;
            color: var(--color-text-primary);
        }

        .back-links {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            color: var(--color-primary);
            text-decoration: none;
            font-size: var(--font-size-sm);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-md);
            transition: all var(--transition-base);
        }

        .back-link:hover {
            background: var(--hover-link-bg);
        }

        .back-link svg {
            width: 16px;
            height: 16px;
        }

        .article-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-sm);
        }

        .article-subtitle {
            font-size: 13px;
            color: var(--color-text-tertiary);
            margin-bottom: var(--spacing-lg);
        }

        .solution-card {
            background: var(--color-bg-secondary);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-border);
            margin-bottom: var(--spacing-lg);
        }

        .solution-section {
            margin-bottom: var(--spacing-xl);
        }

        .solution-section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-size: var(--font-size-lg);
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-lg);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--color-primary);
            border-radius: 2px;
        }

        .solution-step {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
            padding: var(--spacing-md);
            background: var(--color-bg-primary);
            border-radius: var(--radius-md);
        }

        .solution-step:last-child {
            margin-bottom: 0;
        }

        .step-number {
            width: 28px;
            height: 28px;
            background: var(--color-primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--font-size-sm);
            font-weight: 600;
            flex-shrink: 0;
        }

        .step-content {
            flex: 1;
        }

        .step-title {
            font-weight: 500;
            margin-bottom: var(--spacing-xs);
        }

        .step-desc {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            line-height: 1.6;
        }

        .solution-tips {
            background: rgba(16, 185, 129, 0.08);
            border-left: 4px solid var(--color-success);
            padding: var(--spacing-lg);
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            margin-top: var(--spacing-lg);
        }

        .tips-title {
            font-weight: 600;
            color: var(--color-success);
            margin-bottom: var(--spacing-sm);
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .tips-title svg {
            width: 18px;
            height: 18px;
        }

        .tips-content {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            line-height: 1.6;
        }

        /* 加载指示器 */
        .loading-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 40px 0;
            color: var(--color-text-tertiary);
            font-size: 14px;
        }
        .loading-indicator .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--color-primary);
            animation: dot-bounce 1.2s ease-in-out infinite;
        }
        .loading-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-indicator .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* 富文本内容中图片自适应 */
        .rich-content { overflow-x: hidden; }
        .rich-content img {
            max-width: 100%;
            height: auto;
            border-radius: var(--radius-md);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        .rich-content img.broken-img {
            display: block;
            width: 100%;
            max-width: 400px;
            height: 120px;
            background: #f3f4f6;
            border: 1px dashed #d1d5db;
            border-radius: var(--radius-md);
            position: relative;
            object-fit: none;
        }
        .rich-content .img-placeholder {
            display: block;
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            background: #f9fafb;
            border: 1px dashed #d1d5db;
            border-radius: var(--radius-md);
            text-align: center;
            color: #9ca3af;
            font-size: 13px;
            line-height: 1.6;
        }

        /* 懒加载图片容器 */
        .rich-content .img-lazy-placeholder {
            position: relative;
            width: 100%;
            background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
            background-size: 200% 100%;
            animation: lazy-shimmer 1.5s ease-in-out infinite;
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        /* 懒加载图片样式 */
        .rich-content img.lazy-image {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .rich-content img.lazy-image:not([data-src]) {
            opacity: 1;
        }
        @keyframes lazy-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .contact-section {
            text-align: center;
            padding: var(--spacing-xl);
            background: var(--color-bg-secondary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-border);
        }

        .contact-title {
            font-size: var(--font-size-lg);
            font-weight: 600;
            margin-bottom: var(--spacing-md);
        }

        .contact-desc {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-lg);
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-md) var(--spacing-xl);
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--font-size-base);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-base);
        }

        .btn-primary:hover {
            background: var(--color-primary-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-primary svg {
            width: 18px;
            height: 18px;
        }

        /* 问题解决确认区域 */
        .feedback-section {
            background: #ffffff;
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            box-shadow: var(--shadow-sm);
            border: 1px solid #E2DDD3;
            margin-bottom: var(--spacing-lg);
        }

        .feedback-header {
            text-align: center;
            margin-bottom: var(--spacing-lg);
        }

        .feedback-title {
            font-size: var(--font-size-lg);
            font-weight: 600;
            color: var(--color-text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-sm);
        }

        .feedback-title svg {
            width: 22px;
            height: 22px;
            color: #F59E0B;
        }

        .feedback-hint {
            font-size: var(--font-size-sm);
            color: var(--color-text-tertiary);
            line-height: 1.6;
            padding: 12px 16px;
            background: #FFFBEB;
            border: 1px solid #FEF3C7;
            border-radius: var(--radius-md);
            color: #92400E;
        }

        .feedback-buttons {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
            max-width: 400px;
            margin: 0 auto;
        }

        .btn-resolved {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            padding: 14px 24px;
            background: #10B981;
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--font-size-base);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-base);
        }

        .btn-resolved:hover {
            background: #059669;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.25);
        }

        .btn-resolved svg { width: 18px; height: 18px; }

        .btn-unresolved {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            padding: 14px 24px;
            background: #ffffff;
            color: var(--color-text-secondary);
            border: 2px solid #D4CBB8;
            border-radius: var(--radius-md);
            font-size: var(--font-size-base);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-base);
        }

        .btn-unresolved:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
            background: var(--hover-button-bg);
        }

        .btn-unresolved:active {
            transform: translateY(0);
        }

        .btn-unresolved svg { width: 18px; height: 18px; }

        /* 联系客服展开区域 */
        .contact-panel {
            display: none;
            margin-top: var(--spacing-lg);
            padding-top: var(--spacing-lg);
            border-top: 1px solid #E2DDD3;
            text-align: center;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .contact-panel.show { display: block; }

        .contact-panel-title {
            font-size: var(--font-size-lg);
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-sm);
        }

        .contact-panel-desc {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-lg);
            line-height: 1.6;
        }

        /* 解决成功反馈 */
        .success-feedback {
            display: none;
            text-align: center;
            padding: var(--spacing-lg);
            animation: fadeIn 0.4s ease-out;
        }

        .success-feedback.show { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .success-icon {
            width: 64px;
            height: 64px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--spacing-md);
        }

        .success-icon svg { width: 32px; height: 32px; color: #10B981; }

        .success-text { font-size: var(--font-size-lg); font-weight: 600; color: #10B981; margin-bottom: var(--spacing-xs); }
        .success-desc { font-size: var(--font-size-sm); color: var(--color-text-tertiary); }

        .footer {
            text-align: center;
            padding: var(--spacing-xl);
            font-size: var(--font-size-sm);
            color: var(--color-text-tertiary);
        }
    </style>
</head>
<body>
    <main class="main-container" role="main">
        <!-- Logo -->
        <div class="logo">
            <img src="20260613-010553.jpg" alt="Logo" class="logo-icon">
            <span class="logo-text">MTDS常见问题自查助手</span>
        </div>

        <!-- Back Links -->
        <div class="back-links">
            <a href="index.html" class="back-link" id="backToHome">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
                返回首页
            </a>
            <a href="#" class="back-link" id="backToSubquestion">

                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>

            <div class="feedback-buttons" id="feedbackButtons">

                </div>
                <div class="success-text">问题已解决</div>
                <div class="success-desc">感谢您的使用，祝您工作顺利！</div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>MTDS常见问题自查助手 - 为您提供专业的解决方案</p>
        </footer>
    </main>

    <!-- 引入配置文件 -->
    <script src="config.js"></script>

    <script>
        // 应用外观设置（从 localStorage 读取）
        (function() {
            try {
                var saved = localStorage.getItem('qaui_appearance_settings');
                if (!saved) return;
                var s = JSON.parse(saved);
                if (s.hoverCardBg) document.documentElement.style.setProperty('--hover-card-bg', s.hoverCardBg);
                if (s.hoverButtonBg) document.documentElement.style.setProperty('--hover-button-bg', s.hoverButtonBg);
                if (s.hoverLinkBg) document.documentElement.style.setProperty('--hover-link-bg', s.hoverLinkBg);
            } catch(e) {}
        })();

        // ========== 数据存储模块 ==========
        const DataStore = {
            questions: [],
            currentQuestion: null,

            // 加载问题列表（轻量，不含 content）
            async load() {
                try {
                    const res = await fetch(window.API_BASE + '/api/questions');
                    this.questions = await res.json() || [];
                } catch (error) {
                    console.error('数据加载失败:', error);
                    this.questions = [];
                }
            },

            // 加载单条问题详情（含 content，用于文章页面）
            async loadQuestionDetail(id) {
                try {
                    const res = await fetch(window.API_BASE + '/api/questions/' + id);
                    if (res.ok) {
                        this.currentQuestion = await res.json();
                        return this.currentQuestion;
                    }
                } catch (error) {
                    console.error('加载问题详情失败:', error);
                }
                return null;
            },

            getQuestionById(id) {
                return this.questions.find(q => q.id === id) || null;
            },
            
            getChildrenByParent(parentId) {
                return this.questions.filter(q => q.parentId === parentId).sort((a, b) => a.order - b.order);
            }
        };

        // URL 参数解析
        function getParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                category: params.get('category') || null,
                question: params.get('question') || null
            };
        }

        // 预处理富文本内容，将大 base64 图片替换为懒加载占位符（不预先解码，避免阻塞）
        function preprocessRichContent(html) {
            if (!html) return html;
            
            // 匹配 <img> 标签中的 base64 图片
            const base64ImgRegex = /<img([^>]+)src="(data:image\/[^;]+;base64,[^"]+)"([^>]*)>/gi;
            
            let imageIndex = 0;
            const processedHtml = html.replace(base64ImgRegex, (match, before, src, after) => {
                if (src.length > 10000) {
                    imageIndex++;
                    const placeholderId = `lazy-img-${imageIndex}`;
                    // 使用默认宽高比 16:9（截图常用比例），避免预先解码图片
                    return `<div class="img-lazy-placeholder" id="${placeholderId}" style="padding-top:56.25%" data-src="${src}"></div>`;
                }
                return match;
            });
            
            return processedHtml;
        }
        
        // 图片懒加载 + 错误处理（通过独立 API 获取图片）
        function setupImageLoading(container, questionId) {
            const placeholders = container.querySelectorAll('.img-lazy-placeholder');
            
            const lazyLoad = () => {
                placeholders.forEach(placeholder => {
                    if (placeholder.dataset.loaded === 'true') return;
                    
                    const rect = placeholder.getBoundingClientRect();
                    const isInViewport = rect.top < window.innerHeight * 1.5 && rect.bottom > 0;
                    
                    if (isInViewport) {
                        const imgKey = placeholder.dataset.imgKey;
                        if (imgKey) {
                            const img = document.createElement('img');
                            img.src = `/api/questions/${questionId}/image/${imgKey}`;
                            img.style.position = 'absolute';
                            img.style.top = '0';
                            img.style.left = '0';
                            img.style.width = '100%';
                            img.style.height = '100%';
                            img.style.objectFit = 'contain';
                            img.style.opacity = '0';
                            img.style.transition = 'opacity 0.3s ease';
                            
                            img.onload = () => {
                                img.style.opacity = '1';
                            };
                            
                            img.onerror = () => {
                                placeholder.innerHTML = '<div class="img-placeholder">&#128247; 图片加载失败<br><span style="font-size:11px;">请稍后刷新页面重试</span></div>';
                            };
                            
                            placeholder.appendChild(img);
                            placeholder.dataset.loaded = 'true';
                        }
                    }
                });
            };
            
            // 初始加载一次
            setTimeout(lazyLoad, 50);
            // 滚动时加载
            window.addEventListener('scroll', lazyLoad, { passive: true });
            // 窗口大小改变时加载
            window.addEventListener('resize', lazyLoad);
        }
        
        function replaceBrokenImage(img) {
            const placeholder = document.createElement('div');
            placeholder.className = 'img-placeholder';
            placeholder.innerHTML = '&#128247; 图片加载失败<br><span style="font-size:11px;">请稍后刷新页面重试</span>';
            img.parentNode.replaceChild(placeholder, img);
        }

        // 渲染解决方案
        async function renderSolution() {
            const { question, category } = getParams();
            const loadingEl = document.getElementById('solutionLoading');
            
            await DataStore.load();
            
            const titleEl = document.getElementById('solutionTitle');
            const subtitleEl = document.getElementById('solutionSubtitle');
            const contentEl = document.getElementById('solutionContent');
            const backLinkEl = document.getElementById('backToSubquestion');

            // 如果没找到问题ID，显示提示
            if (!question) {
                titleEl.textContent = '请选择问题';
                subtitleEl.textContent = '请从问题列表选择要查看的问题';
                contentEl.innerHTML = `
                    <div class="solution-section">
                        <div class="solution-tips">
                            <div class="tips-title">提示</div>
                            <div class="tips-content">请从问题列表选择要查看的问题。</div>
                        </div>
                    </div>
                `;
                return;
            }
            
            // 查找问题（从轻量列表获取基本信息）
            var q = DataStore.getQuestionById(question);

            if (!q) {
                titleEl.textContent = '问题不存在';
                subtitleEl.textContent = '无法找到指定的问题';
                contentEl.innerHTML = `
                    <div class="solution-section">
                        <div class="solution-tips">
                            <div class="tips-title">提示</div>
                            <div class="tips-content">无法找到指定的问题，请返回重新选择。</div>
                        </div>
                    </div>
                `;
                return;
            }

            // 如果是文章类型，通过详情接口获取完整内容（含 base64 图片）
            if (q.attribute === 'article') {
                var detail = await DataStore.loadQuestionDetail(question);
                if (detail && detail.content) {
                    q = detail; // 用详情数据覆盖（包含 content）
                }
            }
            
            // 返回上级：根据父级动态计算
            if (category) {
                if (q.parentId && q.parentId !== 'root') {
                    backLinkEl.href = 'subquestion.html?category=' + category + '&path=' + q.parentId;
                } else {
                    backLinkEl.href = 'subquestion.html?category=' + category;
                }
            }

            // 更新页面标题
            titleEl.textContent = q.title;
            subtitleEl.textContent = '问题详情';
            
            // 渲染内容
            if (q.attribute === 'article') {
                if (q.contentType === 'hyperlink' && q.hyperlink) {
                    contentEl.innerHTML = `
                        <div class="solution-section">
                            <h2 class="section-title">外部链接</h2>
                            <div style="padding:16px;background:#f8f9fa;border-radius:8px;text-align:center;">
                                <p style="margin-bottom:16px;">即将跳转到外部链接：</p>
                                <a href="${q.hyperlink}" target="_blank" style="color:var(--color-primary);word-break:break-all;">${q.hyperlink}</a>
                                <p style="margin-top:16px;font-size:14px;color:#666;">正在自动跳转...</p>
                            </div>
                        </div>
                    `;
                    setTimeout(() => {
                        window.open(q.hyperlink, '_blank');
                    }, 1500);
                } else if (q.content) {
                    contentEl.innerHTML = `
                        <div class="solution-section">
                            <h2 class="section-title">解决方案</h2>
                            <div class="rich-content" style="line-height:1.8;font-size:16px;color:var(--color-text-primary);">${q.content}</div>
                        </div>
                    `;
                    // 绑定图片懒加载和错误处理（图片已在服务端分离）
                    setupImageLoading(contentEl, question);
                } else {
                    contentEl.innerHTML = `
                        <div class="solution-section">
                            <div class="solution-tips">
                                <div class="tips-title">提示</div>
                                <div class="tips-content">该问题暂无详细内容。</div>
                            </div>
                        </div>
                    `;
                }
            } else {
                // 目录类型 - 显示子目录/文章列表
                const children = DataStore.getChildrenByParent(question);
                if (children.length > 0) {
                    const childHtml = children.map((child, index) => `
                        <div class="solution-step">
                            <div class="step-number">${index + 1}</div>
                            <div class="step-content">
                                <div class="step-title">
                                    <a href="solution.html?category=${category}&question=${child.id}" style="color:var(--color-primary);text-decoration:none;">
                                        ${child.title}
                                    </a>
                                    <span style="color:#999;font-size:12px;margin-left:8px;">
                                        ${child.attribute === 'directory' ? '目录' : '文章'}
                                    </span>
                                </div>
                            </div>
                        </div>
                    `).join('');
                    
                    contentEl.innerHTML = `
                        <div class="solution-section">
                            <h2 class="section-title">子问题列表</h2>
                            ${childHtml}
                        </div>
                    `;
                } else {
                    contentEl.innerHTML = `
                        <div class="solution-section">
                            <div class="solution-tips">
                                <div class="tips-title">提示</div>
                                <div class="tips-content">该目录下暂无子问题。</div>
                            </div>
                        </div>
                    `;
                }
            }
        }

        // ========== 初始化 ==========
        var serviceDeskUrl = '';

        // 页面加载时获取服务台链接
        fetch(window.API_BASE + '/api/service-desk')
            .then(function(res) { return res.json(); })
            .then(function(data) { serviceDeskUrl = data.url || ''; })
            .catch(function() { /* 静默失败 */ });

        document.addEventListener('DOMContentLoaded', function() {
            renderSolution();

            // 问题已解决
            document.getElementById('btnResolved').addEventListener('click', function() {
                document.getElementById('feedbackButtons').style.display = 'none';
                document.getElementById('successFeedback').classList.add('show');
                console.log('[反馈] 用户确认问题已解决');
            });

            // 问题未解决 → 直接跳转服务台
            document.getElementById('btnUnresolved').addEventListener('click', function() {
                if (serviceDeskUrl) {
                    console.log('[反馈] 跳转服务台:', serviceDeskUrl);
                    window.open(serviceDeskUrl, '_blank');
                } else {
                    alert('暂未配置服务台链接，请联系管理员。');
                }
            });
        });
    </script>
</body>
</html>
