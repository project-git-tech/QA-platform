<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欧派家居 - 智能客服指引</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --color-primary: #7A5D38;
            --color-primary-light: #9A7B53;
            --color-primary-dark: #5D4528;
            --color-secondary: #1F2937;
            --color-accent: #D4AF37;
            --color-accent-light: #E5C158;
            --color-bg-primary: #F5F3EF;
            --color-bg-secondary: #FFFFFF;
            --color-bg-tertiary: #FAFAF9;
            --color-bg-card: #FFFFFF;
            --color-bg-welcome: linear-gradient(135deg, #FFF9F3 0%, #FDF8F3 50%, #F5F3EF 100%);
            --color-bg-category: #FFFFFF;
            --color-text-primary: #1F2937;
            --color-text-secondary: #4B5563;
            --color-text-tertiary: #6B7280;
            --color-border: #E5E7EB;
            --color-border-light: #F3F4F6;
            --color-border-card: #E5E7EB;
            --color-success: #10B981;
            --color-warning: #F59E0B;
            --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(122, 93, 56, 0.08);
            --shadow-lg: 0 10px 20px rgba(122, 93, 56, 0.1);
            --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.04);
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --spacing-2xl: 48px;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;
            --font-family-base: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            --font-size-xs: 12px;
            --font-size-sm: 14px;
            --font-size-base: 16px;
            --font-size-lg: 18px;
            --font-size-xl: 22px;
            --font-size-2xl: 26px;
            --font-size-3xl: 30px;
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family-base);
            font-size: var(--font-size-base);
            color: var(--color-text-primary);
            background: var(--color-bg-primary);
            -webkit-font-smoothing: antialiased;
        }

        /* Logo */
        .logo {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-lg);
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(122, 93, 56, 0.15);
        }

        .logo-text {
            font-size: var(--font-size-lg);
            font-weight: 700;
            color: var(--color-primary);
            letter-spacing: -0.2px;
        }

        /* Main Container */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--spacing-md);
            padding-top: var(--spacing-md);
        }

        /* Page Header with Logo and Admin Button */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
        }

        .page-header .logo {
            margin-bottom: 0;
        }

        .page-header .admin-btn {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(122, 93, 56, 0.3);
            color: var(--color-primary);
        }

        .page-header .admin-btn:hover {
            background: #fff;
            border-color: var(--color-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        @media (max-width: 640px) {
            .page-header .admin-btn span {
                display: none;
            }
            .page-header .admin-btn {
                padding: 10px;
                border-radius: 50%;
            }
        }

        /* Hero Section - Combined Welcome + Search */
        .hero-section {
            background: 
                linear-gradient(135deg, #FBBF24 0%, #F59E0B 30%, #D97706 60%, #B45309 100%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.15) 0%, transparent 50%),
                linear-gradient(45deg, rgba(255, 255, 255, 0.05) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.05) 75%);
            background-size: 
                100% 100%,
                100% 100%,
                50px 50px;
            border-radius: var(--radius-xl);
            padding: var(--spacing-2xl);
            margin-bottom: var(--spacing-xl);
            box-shadow: 
                0 25px 50px rgba(217, 119, 6, 0.35),
                0 0 80px rgba(245, 158, 11, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            color: white;
            max-width: 100%;
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0.05) 40%, transparent 70%);
            pointer-events: none;
        }

        .header-controls {
            position: absolute;
            top: var(--spacing-md);
            right: var(--spacing-md);
        }

        .bg-color-picker {
            width: 32px;
            height: 32px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            cursor: pointer;
            overflow: hidden;
            transition: all var(--transition-fast);
            background: transparent;
        }

        .bg-color-picker:hover {
            transform: scale(1.1);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .bg-color-picker::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .bg-color-picker::-webkit-color-swatch {
            border: none;
            border-radius: 50%;
        }

        .admin-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--radius-full);
            font-size: var(--font-size-sm);
            color: white;
            cursor: pointer;
            transition: all var(--transition-fast);
            text-decoration: none;
            margin-left: 8px;
        }

        .admin-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-1px);
        }

        .admin-btn:active {
            transform: translateY(0);
            background: rgba(255, 255, 255, 0.3);
        }

        .admin-btn i {
            font-size: 16px;
        }

        /* Responsive admin button */
        @media (max-width: 640px) {
            .admin-btn span {
                display: none;
            }
            .admin-btn {
                padding: 8px 12px;
                border-radius: 50%;
            }
        }

        .hero-welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }

        .welcome-greeting {
            font-size: var(--font-size-xl);
            font-weight: 600;
            margin-bottom: var(--spacing-xs);
        }

        .welcome-guide {
            font-size: var(--font-size-base);
            opacity: 0.9;
        }

        /* Search Section */
        .search-container {
            position: relative;
            max-width: 700px;
            margin: 0 auto;
        }

        .search-input {
            width: 100%;
            padding: var(--spacing-md) var(--spacing-xl);
            padding-left: calc(var(--spacing-xl) + 32px);
            border: none;
            border-radius: var(--radius-lg);
            font-size: var(--font-size-base);
            background: rgba(255, 255, 255, 0.95);
            transition: all var(--transition-base);
            color: var(--color-text-primary);
        }

        .search-input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3);
            background: white;
        }

        .search-input::placeholder {
            color: var(--color-text-tertiary);
        }

        .search-icon {
            position: absolute;
            left: var(--spacing-md);
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: var(--color-text-tertiary);
            transition: color var(--transition-fast);
        }

        .search-input:focus + .search-icon {
            color: var(--color-primary);
        }

        /* Hot Questions in Hero */
        .hero-hot-questions {
            margin-top: var(--spacing-lg);
            padding-top: var(--spacing-lg);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hero-hot-row {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
            justify-content: center;
            align-items: center;
        }

        .hero-hot-title {
            font-size: var(--font-size-sm);
            font-weight: 600;
            opacity: 0.9;
        }

        .hero-hot-tag {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: var(--spacing-xs) var(--spacing-sm);
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--radius-full);
            font-size: var(--font-size-xs);
            color: white;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .hero-hot-tag:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* Legacy classes kept for JS compatibility */
        .search-section {
            display: none;
        }

        .hot-question-tag:hover {
            background: rgba(122, 93, 56, 0.1);
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .hot-question-tag svg {
            width: 12px;
            height: 12px;
        }

        /* Progress Section - Removed */
        .progress-section {
            display: none;
        }

        .progress-connector {
            width: 48px;
            height: 2px;
            background: var(--color-border);
            margin-top: 14px;
            flex-shrink: 0;
        }

        .progress-connector.completed {
            background: var(--color-success);
        }

        /* Category Section */
        .category-section {
            margin-bottom: var(--spacing-xl);
        }

        .section-title {
            font-size: var(--font-size-xl);
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-md);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
        }

        .section-title::before,
        .section-title::after {
            content: '';
            width: 32px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--color-primary));
        }

        .section-title::after {
            background: linear-gradient(90deg, var(--color-primary), transparent);
        }

        .section-subtitle {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }

        .category-section {
            background: var(--color-bg-card);
            border-radius: var(--radius-xl);
            padding: var(--spacing-xl);
            box-shadow: var(--shadow-card);
            border: 1px solid var(--color-border);
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-md);
        }

        .category-card {
            background: var(--color-bg-tertiary);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            cursor: pointer;
            transition: all var(--transition-base);
            text-align: center;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .category-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
            transform: scaleX(0);
            transition: transform var(--transition-base);
        }

        .category-card:hover {
            border-color: var(--color-primary);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
            background: var(--color-bg-secondary);
        }

        .category-card:hover::before {
            transform: scaleX(1);
        }

        .category-icon {
            width: 52px;
            height: 52px;
            margin-bottom: var(--spacing-md);
            background: linear-gradient(135deg, rgba(122, 93, 56, 0.1), rgba(212, 175, 55, 0.1));
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-base);
        }

        .category-card:hover .category-icon {
            background: linear-gradient(135deg, rgba(122, 93, 56, 0.15), rgba(212, 175, 55, 0.15));
            transform: scale(1.05);
        }

        .category-icon svg {
            width: 28px;
            height: 28px;
            color: var(--color-primary);
        }

        .category-title {
            font-size: var(--font-size-base);
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-xs);
        }

        .category-description {
            font-size: var(--font-size-xs);
            color: var(--color-text-tertiary);
            line-height: 1.5;
            margin-bottom: var(--spacing-sm);
        }

        .category-count {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            font-size: var(--font-size-xs);
            color: var(--color-primary);
            background: rgba(122, 93, 56, 0.08);
            padding: 2px var(--spacing-sm);
            border-radius: var(--radius-full);
        }

        /* Subquestion Section */
        .subquestion-section, .solution-section {
            display: none;
        }

        .subquestion-section.visible, .solution-section.visible {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-xl);
            font-size: var(--font-size-sm);
        }

        .breadcrumb-item {
            color: var(--color-text-tertiary);
            text-decoration: none;
            cursor: pointer;
        }

        .breadcrumb-item:hover {
            color: var(--color-primary);
        }

        .breadcrumb-item.active {
            color: var(--color-text-primary);
            font-weight: 500;
        }

        .breadcrumb-separator {
            color: var(--color-text-tertiary);
        }

        .subquestion-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .subquestion-item {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            cursor: pointer;
            transition: all var(--transition-base);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .subquestion-item:hover {
            border-color: var(--color-primary);
            box-shadow: var(--shadow-sm);
            background: rgba(122, 93, 56, 0.02);
        }

        .subquestion-item.selected {
            border-color: var(--color-primary);
            background: rgba(122, 93, 56, 0.04);
        }

        .subquestion-content {
            flex: 1;
            min-width: 0;
        }

        .subquestion-title {
            font-size: var(--font-size-base);
            font-weight: 500;
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-xs);
        }

        .subquestion-meta {
            font-size: var(--font-size-xs);
            color: var(--color-text-tertiary);
        }

        .subquestion-arrow {
            width: 20px;
            height: 20px;
            color: var(--color-text-tertiary);
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }

        .subquestion-item:hover .subquestion-arrow {
            color: var(--color-primary);
            transform: translateX(4px);
        }

        /* Solution Section */
        .solution-card {
            background: var(--color-bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            border: 1px solid var(--color-border);
        }

        .solution-header {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            color: white;
            padding: var(--spacing-xl);
        }

        .solution-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            padding: var(--spacing-xs) var(--spacing-md);
            border-radius: var(--radius-full);
            font-size: var(--font-size-xs);
            font-weight: 500;
            margin-bottom: var(--spacing-md);
        }

        .solution-title {
            font-size: var(--font-size-xl);
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
            letter-spacing: -0.3px;
        }

        .solution-subtitle {
            font-size: var(--font-size-sm);
            opacity: 0.9;
            font-weight: 400;
        }

        .solution-body {
            padding: var(--spacing-xl);
        }

        .solution-steps {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xl);
        }

        .solution-step {
            display: flex;
            gap: var(--spacing-md);
            padding-bottom: var(--spacing-xl);
            border-bottom: 1px solid var(--color-border-light);
        }

        .solution-step:last-child {
            padding-bottom: 0;
            border-bottom: none;
        }

        .step-number {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: var(--font-size-xs);
            box-shadow: var(--shadow-sm);
        }

        .step-content {
            flex: 1;
        }

        .step-title {
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-xs);
            font-size: var(--font-size-base);
        }

        .step-description {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            line-height: 1.7;
        }

        .solution-note {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.08), rgba(122, 93, 56, 0.06));
            border-left: 3px solid var(--color-accent);
            padding: var(--spacing-md) var(--spacing-lg);
            margin-top: var(--spacing-lg);
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
        }

        .solution-note-title {
            font-weight: 600;
            color: var(--color-primary-dark);
            margin-bottom: var(--spacing-xs);
            font-size: var(--font-size-sm);
        }

        .solution-note-text {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
        }

        .action-buttons {
            display: flex;
            gap: var(--spacing-md);
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-xl);
            border-top: 1px solid var(--color-border);
        }

        .btn {
            padding: var(--spacing-md) var(--spacing-xl);
            border-radius: var(--radius-lg);
            font-size: var(--font-size-base);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-base);
            border: none;
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--color-primary-light) 0%, var(--color-primary) 100%);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--color-bg-card);
            color: var(--color-text-primary);
            border: 1px solid var(--color-border);
        }

        .btn-secondary:hover {
            background: var(--color-bg-secondary);
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .btn-icon {
            width: 18px;
            height: 18px;
        }

        @media (max-width: 768px) {
            .main-container {
                padding: var(--spacing-md);
            }

            .progress-container {
                flex-direction: column;
                gap: var(--spacing-xs);
            }
            
            .progress-connector {
                width: 2px;
                height: 20px;
                margin-top: 0;
            }

            .action-buttons {
                flex-direction: column;
                gap: var(--spacing-md);
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .category-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: var(--spacing-sm);
            }

            .category-card {
                min-height: 140px;
                padding: var(--spacing-md);
            }

            .category-icon {
                width: 44px;
                height: 44px;
            }

            .category-icon svg {
                width: 24px;
                height: 24px;
            }

            .logo-icon {
                width: 40px;
                height: 40px;
                font-size: var(--font-size-lg);
            }

            .logo-text {
                font-size: var(--font-size-xl);
            }

            .welcome-title {
                font-size: var(--font-size-xl);
            }

            .section-title::before,
            .section-title::after {
                width: 16px;
            }
        }

        @media (max-width: 480px) {
            .category-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="main-container" role="main">
        <!-- Page Header with Logo and Admin Button -->
        <header class="page-header">
            <div class="logo">
                <img src="20260613-010553.jpg" alt="Logo" class="logo-icon">
                <span class="logo-text">MTDS常见问题自查助手</span>
            </div>
            <a href="admin.html" class="admin-btn" title="后台管理">
                <i class="ri-settings-3-line"></i>
                <span>后台管理</span>
            </a>
        </header>
        
        <!-- Hero Section - Combined Welcome + Search -->
        <section class="hero-section">
            <div class="header-controls">
                <input type="color" id="bgColorPicker" class="bg-color-picker" value="#FBBF24" title="选择背景颜色">
            </div>
            <div class="hero-welcome">
                <span class="welcome-greeting">您好，请选择您遇到的问题类型</span>
                <span class="welcome-guide">我将为您提供详细的解决方案指引</span>
            </div>
            
            <div class="search-container">
                <input type="search" class="search-input" placeholder="搜索您的问题..." id="searchInput">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </div>

            <div class="hero-hot-questions">
                <div class="hero-hot-row">
                    <span class="hero-hot-title">热门问题：</span>
                    <button class="hero-hot-tag">订单查询</button>
                    <button class="hero-hot-tag">安装预约</button>
                    <button class="hero-hot-tag">产品保养</button>
                    <button class="hero-hot-tag">售后维修</button>
                    <button class="hero-hot-tag">退换货政策</button>
                </div>
            </div>
        </section>

        <!-- Category Section -->
        <section class="category-section" id="categorySection">
            <h2 class="section-title">问题类型</h2>
            <p class="section-subtitle">选择您遇到的问题类型，快速找到解决方案</p>
            <div class="category-grid" id="categoryGrid">
                <!-- Categories loaded dynamically from localStorage -->
            </div>
        </section>
    </main>

    <script>
        // ============================================
        // DataStore Module - 共享数据存储管理
        // ============================================
        const DataStore = {
            data: null,
            load() {
                const d = localStorage.getItem('qaui_admin_data');
                if (d) {
                    try {
                        this.data = JSON.parse(d);
                    } catch (e) {
                        this.data = { questionTypes: [], questions: [], hotQuestions: [] };
                    }
                } else {
                    this.data = { questionTypes: [], questions: [], hotQuestions: [] };
                }
                return this.data;
            },
            getQuestionTypes() {
                if (!this.data) this.load();
                return this.data.questionTypes || [];
            },
            getQuestions() {
                if (!this.data) this.load();
                return this.data.questions || [];
            },
            getHotQuestions() {
                if (!this.data) this.load();
                return this.data.hotQuestions || [];
            },
            getQuestionsByType(typeId) {
                return this.getQuestions().filter(q => q.typeId === typeId);
            }
        };

        // Category icon mapping
        const categoryIcons = {
            'ri-home-line': '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
            'ri-service-line': '<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>',
            'ri-file-text-line': '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>',
            'ri-truck-line': '<rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>',
            'ri-money-cny-circle-line': '<circle cx="12" cy="12" r="10"/><path d="M12 6v12"/><path d="M15 9.5c0-1.38-1.34-2.5-3-2.5s-3 1.12-3 2.5 1.34 2.5 3 2.5 3 1.12 3 2.5-1.34 2.5-3 2.5"/>',
            'ri-customer-service-line': '<path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 2a10 10 0 0 1 10 10"/><circle cx="12" cy="12" r="4"/>'
        };

        // ============================================
        // Dynamic Data Loading Functions
        // ============================================
        function loadCategories() {
            const grid = document.getElementById('categoryGrid');
            const types = DataStore.getQuestionTypes().filter(t => t.status);

            if (types.length === 0) {
                grid.innerHTML = '<div class="empty-state"><p style="color:var(--color-text-tertiary);padding:40px;text-align:center;">暂无问题类型，请到后台配置</p></div>';
                return;
            }

            grid.innerHTML = types.map(type => {
                const count = DataStore.getQuestionsByType(type.id).length;
                const iconPath = categoryIcons[type.icon] || categoryIcons['ri-file-text-line'];
                return `
                    <div class="category-card" data-category="${type.id}">
                        <div class="category-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                ${iconPath}
                            </svg>
                        </div>
                        <h3 class="category-title">${type.name}</h3>
                        <p class="category-description">点击查看${type.name}相关问题</p>
                        <span class="category-count">${count} 个问题</span>
                    </div>
                `;
            }).join('');

            // Reattach click handlers
            grid.querySelectorAll('.category-card').forEach(card => {
                card.addEventListener('click', () => {
                    const category = card.dataset.category;
                    window.location.href = `subquestion.html?category=${category}`;
                });
            });
        }

        function loadHotQuestions() {
            const container = document.querySelector('.hero-hot-row');
            const hotQuestions = DataStore.getHotQuestions().filter(h => h.status);

            if (hotQuestions.length === 0) {
                container.innerHTML = '<span class="hero-hot-title">热门问题：</span><span style="color:rgba(255,255,255,0.6);font-size:var(--font-size-sm);">暂无热门问题</span>';
                return;
            }

            // Sort by order
            hotQuestions.sort((a, b) => a.order - b.order);

            container.innerHTML = '<span class="hero-hot-title">热门问题：</span>' +
                hotQuestions.map(h => `<button class="hero-hot-tag">${h.title}</button>`).join('');
        }

        // ============================================
        // Real-time Data Synchronization
        // ============================================
        function refreshAllData() {
            DataStore.load();
            loadCategories();
            loadHotQuestions();
        }

        // Listen for storage changes from other tabs/windows (admin.html)
        window.addEventListener('storage', function(e) {
            if (e.key === 'qaui_admin_data') {
                console.log('检测到后台数据更新，刷新展示数据...');
                refreshAllData();
            }
        });

        // Listen for custom dataUpdated event from same-tab (admin.html)
        window.addEventListener('dataUpdated', function(e) {
            console.log('检测到数据更新，刷新展示数据...');
            refreshAllData();
        });

        // ============================================
        // Initial Data Load
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            DataStore.load();
            loadCategories();
            loadHotQuestions();
        });

        // Category click handler - navigate to subquestion page
        document.querySelectorAll('.category-card').forEach(card => {
            card.addEventListener('click', () => {
                const category = card.dataset.category;
                window.location.href = `subquestion.html?category=${category}`;
            });
        });

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            if (searchTerm.length > 0) {
                // Simple search - could be enhanced
                console.log('Searching for:', searchTerm);
            }
        });

        // Hot question tags click handler (delegated)
        document.querySelector('.hero-hot-row').addEventListener('click', function(e) {
            if (e.target.classList.contains('hero-hot-tag')) {
                document.getElementById('searchInput').value = e.target.textContent;
            }
        });

        // Background color picker
        document.getElementById('bgColorPicker').addEventListener('input', function(e) {
            const color = e.target.value;
            const heroSection = document.querySelector('.hero-section');
            heroSection.style.background = `
                linear-gradient(135deg, ${color} 0%, ${adjustColor(color, -20)} 30%, ${adjustColor(color, -40)} 60%, ${adjustColor(color, -60)} 100%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.15) 0%, transparent 50%),
                linear-gradient(45deg, rgba(255, 255, 255, 0.05) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.05) 75%)
            `;
            heroSection.style.boxShadow = `
                0 25px 50px ${hexToRgba(color, 0.35)},
                0 0 80px ${hexToRgba(color, 0.2)},
                inset 0 1px 0 rgba(255, 255, 255, 0.15)
            `;
        });

        function adjustColor(hex, amount) {
            const num = parseInt(hex.replace('#', ''), 16);
            const r = Math.min(255, Math.max(0, (num >> 16) + amount));
            const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amount));
            const b = Math.min(255, Math.max(0, (num & 0x0000FF) + amount));
            return `#${(1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1)}`;
        }

        function hexToRgba(hex, alpha) {
            const num = parseInt(hex.replace('#', ''), 16);
            const r = num >> 16;
            const g = (num >> 8) & 0x00FF;
            const b = num & 0x0000FF;
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }
    </script>
</body>
</html>
