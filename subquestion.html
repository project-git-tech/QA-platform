<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTDS常见问题自查助手</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --color-primary: #7A5D38;
            --color-primary-light: #9A7B53;
            --color-primary-dark: #5D4528;
            --color-secondary: #1F2937;
            --color-accent: #D4AF37;
            --color-bg-primary: #F5F3EF;
            --color-bg-secondary: #FFFFFF;
            --color-text-primary: #1F2937;
            --color-text-secondary: #4B5563;
            --color-text-tertiary: #6B7280;
            --color-border: #E5E7EB;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 12px rgba(122, 93, 56, 0.08);
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --font-family-base: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            --font-size-sm: 14px;
            --font-size-base: 16px;
            --font-size-lg: 18px;
            --font-size-xl: 22px;
            --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family-base);
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            min-height: 100vh;
        }

        .main-container {
            max-width: 900px;
            margin: 0 auto;
            padding: var(--spacing-lg);
            padding-top: var(--spacing-xl);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(122, 93, 56, 0.15);
        }

        .logo-text {
            font-size: var(--font-size-lg);
            font-weight: 600;
            color: var(--color-text-primary);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            color: var(--color-primary);
            text-decoration: none;
            font-size: var(--font-size-sm);
            margin-bottom: var(--spacing-lg);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-md);
            transition: all var(--transition-base);
        }

        .back-link:hover {
            background: rgba(122, 93, 56, 0.08);
        }

        .back-link svg {
            width: 16px;
            height: 16px;
        }

        /* Page Header - containing logo and admin button */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
        }

        .page-header-content {
            flex: 1;
            background: linear-gradient(135deg, #FBBF24 0%, #F59E0B 30%, #D97706 60%, #B45309 100%);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            text-align: center;
            color: white;
            position: relative;
        }

        .page-title {
            font-size: var(--font-size-xl);
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
        }

        .page-subtitle {
            font-size: var(--font-size-sm);
            opacity: 0.9;
        }

        .page-header .admin-btn {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(122, 93, 56, 0.3);
            color: var(--color-primary);
            margin-left: var(--spacing-md);
        }

        .page-header .admin-btn:hover {
            background: #fff;
            border-color: var(--color-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        @media (max-width: 640px) {
            .page-header {
                flex-direction: column;
                gap: var(--spacing-md);
            }
            .page-header .admin-btn {
                margin-left: 0;
                align-self: flex-end;
            }
            .page-header .admin-btn span {
                display: none;
            }
            .page-header .admin-btn {
                padding: 10px;
                border-radius: 50%;
            }
        }

        .subquestion-section {
            background: var(--color-bg-secondary);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-border);
        }

        .subquestion-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .subquestion-card {
            display: flex;
            align-items: flex-start;
            gap: var(--spacing-md);
            padding: var(--spacing-lg);
            background: var(--color-bg-primary);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-base);
            border: 1px solid transparent;
        }

        .subquestion-card:hover {
            background: var(--color-bg-secondary);
            border-color: var(--color-primary);
            box-shadow: var(--shadow-sm);
            transform: translateX(4px);
        }

        .subquestion-icon {
            width: 40px;
            height: 40px;
            background: rgba(122, 93, 56, 0.1);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .subquestion-icon svg {
            width: 20px;
            height: 20px;
            color: var(--color-primary);
        }

        .subquestion-content {
            flex: 1;
            min-width: 0;
        }

        .subquestion-title {
            font-size: var(--font-size-base);
            font-weight: 500;
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-xs);
        }

        .subquestion-desc {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            line-height: 1.5;
        }

        .footer {
            text-align: center;
            padding: var(--spacing-xl);
            font-size: var(--font-size-sm);
            color: var(--color-text-tertiary);
        }

        .header-controls {
            position: absolute;
            top: var(--spacing-lg);
            right: 0;
        }

        .admin-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: var(--radius-full);
            font-size: var(--font-size-sm);
            color: white;
            cursor: pointer;
            transition: all var(--transition-base);
            text-decoration: none;
        }

        .admin-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-1px);
        }

        .admin-btn:active {
            transform: translateY(0);
        }

        .admin-btn i {
            font-size: 16px;
        }

        /* Responsive admin button */
        @media (max-width: 640px) {
            .admin-btn span {
                display: none;
            }
            .admin-btn {
                padding: 8px 12px;
                border-radius: 50%;
            }
        }

        .subquestion-tree {
            padding-left: 20px;
            border-left: 2px dashed var(--color-border);
            margin-left: 20px;
        }

        .subquestion-item {
            position: relative;
        }

        .subquestion-item::before {
            content: '';
            position: absolute;
            left: -22px;
            top: 24px;
            width: 12px;
            height: 2px;
            background: var(--color-border);
        }

        .child-questions {
            margin-top: var(--spacing-sm);
            padding-left: var(--spacing-lg);
        }

        .child-card {
            background: rgba(122, 93, 56, 0.04);
        }
    </style>
</head>
<body>
    <main class="main-container" role="main">
        <!-- Logo -->
        <div class="logo">
            <img src="20260613-010553.jpg" alt="Logo" class="logo-icon">
            <span class="logo-text">MTDS常见问题自查助手</span>
        </div>

        <!-- Back Link -->
        <a href="index.html" class="back-link" id="backLink">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            返回首页
        </a>

        <!-- Page Header -->
        <section class="page-header">
            <div class="page-header-content">
                <h1 class="page-title" id="categoryTitle">选择具体问题</h1>
                <p class="page-subtitle" id="categoryDesc">请选择您遇到的具体问题，我将为您提供详细的解决方案</p>
            </div>
            <a href="admin.html" class="admin-btn" title="后台管理">
                <i class="ri-settings-3-line"></i>
                <span>后台管理</span>
            </a>
        </section>

        <!-- Subquestion Section -->
        <section class="subquestion-section" id="subquestionSection">
            <div class="subquestion-list" id="subquestionList">
                <!-- Subquestions will be populated by JavaScript -->
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>MTDS常见问题自查助手 - 为您提供专业的解决方案</p>
        </footer>
    </main>

    <script>
        // ============================================
        // DataStore Module - 共享数据存储管理
        // ============================================
        const DataStore = {
            data: null,
            load() {
                const d = localStorage.getItem('qaui_admin_data');
                if (d) {
                    try {
                        this.data = JSON.parse(d);
                    } catch (e) {
                        this.data = { questionTypes: [], questions: [], hotQuestions: [] };
                    }
                } else {
                    this.data = { questionTypes: [], questions: [], hotQuestions: [] };
                }
                return this.data;
            },
            getQuestionTypes() {
                if (!this.data) this.load();
                return this.data.questionTypes || [];
            },
            getQuestions() {
                if (!this.data) this.load();
                return this.data.questions || [];
            },
            getQuestionsByType(typeId) {
                return this.getQuestions().filter(q => q.typeId === typeId).sort((a, b) => a.order - b.order);
            }
        };

        // Fallback data for when localStorage is empty
        const fallbackData = {
            order: {
                title: '订单相关',
                description: '订单查询、修改、取消、支付问题等',
                items: [
                    { id: 'order-1', title: '如何查询订单状态？', desc: '查询订单的当前处理进度和物流信息' },
                    { id: 'order-2', title: '如何修改订单信息？', desc: '修改收货地址、联系电话等订单信息' },
                    { id: 'order-3', title: '如何取消订单？', desc: '订单取消的条件和操作流程' }
                ]
            },
            product: {
                title: '产品咨询',
                description: '产品规格、材质说明、定制方案等',
                items: [
                    { id: 'product-1', title: '产品规格参数', desc: '查看产品的详细规格和技术参数' },
                    { id: 'product-2', title: '材质环保说明', desc: '产品材质的环保认证和安全标准' },
                    { id: 'product-3', title: '定制方案咨询', desc: '个性化定制的流程和可选方案' }
                ]
            }
        };

        // Get category from URL parameter
        function getCategoryFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('category') || 'type_1';
        }

        // Render icon based on question attribute
        function getQuestionIcon(attribute) {
            if (attribute === 'directory') {
                return '<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>';
            }
            return '<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>';
        }

        // Get question type info
        function getQuestionTypeInfo(typeId) {
            const types = DataStore.getQuestionTypes();
            return types.find(t => t.id === typeId) || { name: '未知类型', icon: 'ri-file-text-line' };
        }

        // Build question tree
        function buildQuestionTree(questions, parentId = null) {
            return questions.filter(q => q.parentId === parentId).map(q => ({
                ...q,
                children: buildQuestionTree(questions, q.id)
            }));
        }

        // Render a question card
        function renderQuestionCard(question, isChild = false) {
            const icon = getQuestionIcon(question.attribute);
            const hasChildren = question.children && question.children.length > 0;
            const cardClass = isChild ? 'subquestion-card child-card' : 'subquestion-card';

            return `
                <div class="${cardClass}" data-question-id="${question.id}" data-attribute="${question.attribute}">
                    <div class="subquestion-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            ${icon}
                        </svg>
                    </div>
                    <div class="subquestion-content">
                        <h3 class="subquestion-title">${question.title}</h3>
                        ${question.attribute === 'article' && question.contentType === 'hyperlink' && question.hyperlink ?
                            '<p class="subquestion-desc">链接：' + question.hyperlink + '</p>' :
                            (question.attribute === 'article' && question.content ?
                                '<p class="subquestion-desc">点击查看详情</p>' : '')}
                    </div>
                </div>
                ${hasChildren ? `
                    <div class="child-questions">
                        ${question.children.map(child => renderQuestionCard(child, true)).join('')}
                    </div>
                ` : ''}
            `;
        }

        // Render subquestions
        function renderSubquestions() {
            const category = getCategoryFromUrl();
            const list = document.getElementById('subquestionList');

            // Try to load from localStorage
            const questions = DataStore.getQuestionsByType(category);
            const typeInfo = getQuestionTypeInfo(category);

            if (questions.length > 0) {
                // Update header with type info
                document.getElementById('categoryTitle').textContent = typeInfo.name;
                document.getElementById('categoryDesc').textContent = '请选择您遇到的具体问题';

                // Build tree and render
                const tree = buildQuestionTree(questions, null);
                list.innerHTML = tree.map(q => renderQuestionCard(q)).join('');
            } else {
                // Fallback to hardcoded data
                const data = fallbackData[category] || fallbackData.product;
                document.getElementById('categoryTitle').textContent = data.title;
                document.getElementById('categoryDesc').textContent = data.description;
                list.innerHTML = data.items.map(item => `
                    <div class="subquestion-card" data-subquestion="${item.id}">
                        <div class="subquestion-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="12" y1="16" x2="12" y2="12"/>
                                <line x1="12" y1="8" x2="12.01" y2="8"/>
                            </svg>
                        </div>
                        <div class="subquestion-content">
                            <h3 class="subquestion-title">${item.title}</h3>
                            <p class="subquestion-desc">${item.desc}</p>
                        </div>
                    </div>
                `).join('');
            }

            // Add click handlers
            document.querySelectorAll('.subquestion-card').forEach(card => {
                card.addEventListener('click', () => {
                    const questionId = card.dataset.questionId;
                    const attribute = card.dataset.attribute;
                    // Navigate to solution page with question details
                    window.location.href = `solution.html?category=${category}&question=${questionId}`;
                });
            });
        }

        // ============================================
        // Real-time Data Synchronization
        // ============================================
        function refreshData() {
            DataStore.load();
            renderSubquestions();
        }

        // Listen for storage changes
        window.addEventListener('storage', function(e) {
            if (e.key === 'qaui_admin_data') {
                console.log('检测到数据更新，刷新页面...');
                refreshData();
            }
        });

        // Listen for custom dataUpdated event from same-tab (admin.html)
        window.addEventListener('dataUpdated', function(e) {
            console.log('检测到数据更新，刷新页面...');
            refreshData();
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            DataStore.load();
            renderSubquestions();
        });
    </script>
</body>
</html>
