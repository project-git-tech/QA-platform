<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTDS常见问题自查助手</title>
    
    <!-- 性能优化：提前建立与Render API的连接 -->
    <link rel="preconnect" href="https://qa-platform-1-zat2.onrender.com">
    <link rel="dns-prefetch" href="https://qa-platform-1-zat2.onrender.com">
    
    <!-- 前后端分离配置 -->
    <script src="config.js"></script>

    <style>
        :root {
            --color-primary: #7A5D38;
            --color-primary-light: #9A7B53;
            --color-primary-dark: #5D4528;
            --color-secondary: #1F2937;
            --color-accent: #D4AF37;
            --color-bg-primary: #F5F3EF;
            --color-bg-secondary: #FFFFFF;
            --color-text-primary: #1F2937;
            --color-text-secondary: #4B5563;
            --color-text-tertiary: #6B7280;
            --color-border: #E5E7EB;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 12px rgba(122, 93, 56, 0.08);
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --font-family-base: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            --font-size-sm: 14px;
            --font-size-base: 16px;
            --font-size-lg: 18px;
            --font-size-xl: 22px;
            --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        :root {
            --hover-card-bg: #FFF8ED;
            --hover-button-bg: #FFF8ED;
            --hover-link-bg: #FFF8ED;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-family-base); background: #EEEAE4; color: var(--color-text-primary); min-height: 100vh; }
        .main-container { max-width: 900px; margin: 0 auto; padding: var(--spacing-lg); padding-top: var(--spacing-xl); }
        .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; gap: var(--spacing-md); }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(122, 93, 56, 0.2); border-top-color: var(--color-primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--color-text-secondary); font-size: var(--font-size-sm); }
        .logo { display: flex; align-items: center; gap: var(--spacing-md); margin-bottom: var(--spacing-xl); }
        .logo-icon { width: 36px; height: 36px; border-radius: var(--radius-md); object-fit: cover; box-shadow: 0 2px 8px rgba(122, 93, 56, 0.15); }
        .logo-text { font-size: var(--font-size-lg); font-weight: 600; color: var(--color-text-primary); }
        .back-link { display: inline-flex; align-items: center; gap: var(--spacing-xs); color: var(--color-primary); text-decoration: none; font-size: var(--font-size-sm); margin-bottom: var(--spacing-lg); padding: var(--spacing-sm) var(--spacing-md); border-radius: var(--radius-md); transition: all var(--transition-base); }
        .back-link:hover { background: rgba(122, 93, 56, 0.08); }
        .back-link svg { width: 16px; height: 16px; }
        .page-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: var(--spacing-md); gap: var(--spacing-md); }
        .page-header-content { flex: 1; }
        .page-title { font-size: 20px; font-weight: 600; color: var(--color-text-primary); margin-bottom: 2px; }
        .page-subtitle { font-size: 13px; color: var(--color-text-tertiary); }
        .subquestion-section { background: #ffffff; border-radius: var(--radius-lg); padding: var(--spacing-lg); box-shadow: 0 1px 6px rgba(0, 0, 0, 0.07); border: 1px solid #E2DDD3; }
        .scene-guide { display: none; }
        .subquestion-list { display: flex; flex-direction: column; gap: var(--spacing-md); }
        .subquestion-card { display: flex; align-items: flex-start; gap: var(--spacing-md); padding: var(--spacing-lg); background: #ffffff; border-radius: var(--radius-md); text-decoration: none !important; color: inherit; transition: all var(--transition-base); border: 1px solid #D4CBB8; box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06); }
        .subquestion-card:hover { background: var(--hover-card-bg); border-color: var(--color-primary); box-shadow: 0 4px 16px rgba(122, 93, 56, 0.12); transform: translateX(3px); }
        .subquestion-card.child-card { background: #FAF8F5; border-left: 4px solid #C9B896; padding-left: calc(var(--spacing-lg) + var(--spacing-md)); margin-left: var(--spacing-lg); }
        .subquestion-card.child-card:hover { border-color: var(--color-primary); border-left-color: var(--color-primary); }
        .subquestion-card.grandchild-card { background: #F7F5F2; border-left: 4px solid #D4CBB8; padding-left: calc(var(--spacing-lg) + var(--spacing-md) * 2); margin-left: calc(var(--spacing-lg) * 2); }
        .subquestion-card.grandchild-card:hover { border-color: var(--color-primary); border-left-color: var(--color-primary); }
        .subquestion-icon { width: 44px; height: 44px; background: rgba(122, 93, 56, 0.08); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all var(--transition-base); }
        .subquestion-card:hover .subquestion-icon { background: rgba(122, 93, 56, 0.15); }
        .subquestion-icon svg { width: 20px; height: 20px; color: var(--color-primary); }
        .subquestion-card[data-attribute="directory"] .subquestion-icon { background: rgba(122, 93, 56, 0.15); }
        .subquestion-card[data-attribute="article"] .subquestion-icon { background: rgba(16, 185, 129, 0.1); }
        .subquestion-card[data-attribute="article"] .subquestion-icon svg { color: #10b981; }
        .subquestion-content { flex: 1; min-width: 0; }
        .subquestion-title { font-size: var(--font-size-base); font-weight: 500; color: var(--color-text-primary); margin-bottom: var(--spacing-xs); display: flex; align-items: center; gap: var(--spacing-sm); }
        .subquestion-type-tag { font-size: 11px; padding: 2px 8px; border-radius: 12px; background: rgba(122, 93, 56, 0.1); color: var(--color-primary); font-weight: 500; }
        .subquestion-card[data-attribute="article"] .subquestion-type-tag { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .subquestion-desc { font-size: var(--font-size-sm); color: var(--color-text-secondary); line-height: 1.5; }
        .subquestion-arrow { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; color: var(--color-text-tertiary); transition: transform var(--transition-base); }
        .subquestion-card:hover .subquestion-arrow { color: var(--color-primary); }
        .footer { text-align: center; padding: var(--spacing-xl); font-size: var(--font-size-sm); color: var(--color-text-tertiary); }
        .admin-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; background: var(--color-bg-primary); border: 1px solid var(--color-border); border-radius: 8px; font-size: var(--font-size-sm); color: var(--color-text-secondary); cursor: pointer; transition: all var(--transition-base); text-decoration: none; }
        .admin-btn:hover { border-color: var(--color-primary); color: var(--color-primary); background: var(--hover-button-bg); }
        @media (max-width: 640px) {
            .page-header { flex-direction: column; align-items: flex-start; }
            .admin-btn span { display: none; }
            .admin-btn { padding: 6px 10px; }
        }
        .empty-state { padding: 40px 20px; text-align: center; color: #999; }
        .empty-state svg { width: 40px; height: 40px; margin-bottom: 8px; }

        /* 骨架屏 */
        .skeleton-card {
            pointer-events: none;
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }
        @keyframes skeleton-pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        .skeleton-card .skeleton-icon {
            background: #E5E0D8;
            border-radius: 8px;
        }
        .skeleton-card .skeleton-title {
            height: 16px;
            background: #E5E0D8;
            border-radius: 4px;
            width: 70%;
            margin-bottom: 8px;
        }
        .skeleton-card .skeleton-desc {
            height: 12px;
            background: #EAE5DD;
            border-radius: 4px;
            width: 45%;
        }
        .skeleton-card .skeleton-arrow {
            background: #E5E0D8;
            border-radius: 4px;
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }
        .type-card { display: flex; align-items: center; gap: 16px; padding: 24px; background: #ffffff; border-radius: var(--radius-lg); text-decoration: none !important; color: inherit; border: 1px solid #D4CBB8; transition: all var(--transition-base); box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06); }
        .type-card:hover { border-color: var(--color-primary); box-shadow: 0 6px 20px rgba(122, 93, 56, 0.15); transform: translateY(-2px); background: var(--hover-card-bg); }      .type-card-icon { width: 48px; height: 48px; background: rgba(122, 93, 56, 0.08); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .type-card-icon svg { width: 24px; height: 24px; }
        .type-card-name { flex: 1; font-size: var(--font-size-base); font-weight: 500; color: var(--color-text-primary); }
        .type-card-arrow { width: 20px; height: 20px; opacity: 0.4; transition: all var(--transition-base); }
        .type-card:hover .type-card-arrow { opacity: 1; transform: translateX(4px); }
    </style>
</head>
<body>
    <main class="main-container" role="main">
        <!-- Logo -->
        <div class="logo">
            <img src="20260613-010553.jpg" alt="Logo" class="logo-icon">
            <span class="logo-text">MTDS常见问题自查助手</span>
        </div>

        <!-- Back Links -->
        <div class="back-links">
            <a href="index.html" class="back-link" id="backToHome">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                返回首页
            </a>
            <a href="#" class="back-link" id="backToParent" style="display:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                返回上级
            </a>
        </div>

        <!-- Page Header -->
        <section class="page-header" id="pageHeader">
            <div class="page-header-content">
                <h1 class="page-title" id="categoryTitle">问题列表</h1>
                <p class="page-subtitle" id="categoryDesc">请选择您遇到的具体问题</p>
            </div>
            <a href="admin.html" class="admin-btn" style="display:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span>管理</span>
            </a>
        </section>

        <!-- Subquestion Section -->
        <section class="subquestion-section" id="subquestionSection">
            <!-- 内联提示条（动态显示） -->
            <div id="inlineTip" style="display:none;background:#FDF8EE;border:1px solid #E8DCC8;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#6B5A3E;line-height:1.6;"></div>

            <div class="subquestion-list" id="subquestionList"></div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>MTDS常见问题自查助手 - 为您提供专业的解决方案</p>
        </footer>
    </main>

    <script>
    /* ================================================================
     *  subquestion.html - 问题列表页面（极简版 v3）
     *
     *  设计原则：
     *  1. 页面绝不能卡在"加载中..."状态
     *  2. 先隐藏 loading 遮罩 → 再异步加载数据 → 渲染
     *  3. 即使数据加载失败，用户也能看到可操作的界面
     * ================================================================ */
    (function() {
        'use strict';

        // ---- DOM 引用 ----
        var $ = function(id) { return document.getElementById(id); };
        var listEl     = $('subquestionList');
        var titleEl    = $('categoryTitle');
        var descEl     = $('categoryDesc');
        var inlineTip  = $('inlineTip');
        var backEl     = $('backToParent');

        // ---- 应用外观设置（从 localStorage 读取）----
        (function applyAppearance() {
            try {
                var saved = localStorage.getItem('qaui_appearance_settings');
                if (!saved) return;
                var s = JSON.parse(saved);
                if (s.hoverCardBg) document.documentElement.style.setProperty('--hover-card-bg', s.hoverCardBg);
                if (s.hoverButtonBg) document.documentElement.style.setProperty('--hover-button-bg', s.hoverButtonBg);
                if (s.hoverLinkBg) document.documentElement.style.setProperty('--hover-link-bg', s.hoverLinkBg);
            } catch(e) {}
        })();

        // ---- 第一步：立即隐藏 loading 遮罩（同步执行，100%可靠）----
        // 这是最关键的一行代码：确保用户永远看不到卡死的"加载中..."
        var loadingEl = $('loadingState');
        if (loadingEl) loadingEl.style.display = 'none';
        $('subquestionSection').style.opacity = '1';

        // ---- 第二步：显示骨架屏（匹配最终卡片尺寸，避免布局偏移）----
        var skeletonHTML = '';
        // 默认生成 12 张骨架卡片（覆盖大部分场景，后续数据渲染时会替换）
        for (var i = 0; i < 12; i++) {
            skeletonHTML +=
                '<div class="subquestion-card child-card skeleton-card">' +
                '  <div class="subquestion-icon skeleton-icon" style="width:32px;height:32px;"></div>' +
                '  <div class="subquestion-content" style="flex:1;">' +
                '    <div class="skeleton-title"></div>' +
                '    <div class="skeleton-desc"></div>' +
                '  </div>' +
                '  <div class="skeleton-arrow"></div>' +
                '</div>';
        }
        listEl.innerHTML = skeletonHTML;

        // ---- 第三步：异步加载数据并渲染 ----
        var API = window.API_BASE || '';  // 使用配置文件中的API地址
        var typesData = [];
        var questionsData = [];
        var dataReady = false;  // 数据是否已加载完成

        loadDataAndRender();

        function loadDataAndRender() {
            console.log('[load] 开始加载数据...');
            Promise.all([
                fetch(API + '/api/types')
                    .then(function(r) { return r.json(); })
                    .catch(function(e) { console.error('[types] 加载失败:', e.message); return []; }),
                fetch(API + '/api/questions')
                    .then(function(r) { return r.json(); })
                    .catch(function(e) { console.error('[questions] 加载失败:', e.message); return []; })
            ]).then(function(results) {
                typesData = results[0] || [];
                questionsData = results[1] || [];
                dataReady = true;
                console.log('[load] 数据就绪: types=' + typesData.length + ' | questions=' + questionsData.length);
                if (questionsData.length > 0) {
                    console.log('[load] 第一个问题:', questionsData[0].id, questionsData[0].title);
                }
                // 数据就绪后立即渲染
                doRender();
            }).catch(function(err) {
                console.error('[ERR] 加载异常:', err);
                dataReady = true;
                renderError(err.message || '网络连接失败');
            });
        }

        // ---- 幂等渲染函数：每次调用都完整重新渲染 ----
        function doRender() {
            var fullUrl = window.location.href;
            var search = window.location.search;
            var category = getParam('category');
            console.log('[doRender] === 开始 ===');
            console.log('[doRender] 完整URL: ' + fullUrl);
            console.log('[doRender] search: ' + search);
            console.log('[doRender] category=' + category +
                ' | dataReady=' + dataReady +
                ' | types=' + typesData.length +
                ' | questions=' + questionsData.length);

            // 数据未就绪时显示加载中
            if (!dataReady) {
                console.log('[doRender] 数据未就绪，显示加载中');
                titleEl.textContent = '问题列表';
                descEl.textContent = '请稍候...';
                inlineTip.style.display = 'none';
                listEl.innerHTML =
                    '<div class="empty-state">' +
                    '  <svg viewBox="0 0 24 24" fill="none" stroke="#7A5D38" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M9 12h6"/><path d="M12 9v6"/></svg>' +
                    '  <p>正在加载数据...</p>' +
                    '</div>';
                return;
            }

            // 数据就绪，根据category决定显示什么
            if (!category) {
                console.log('[doRender] 无category → 显示类型选择');
                renderTypeSelector();
            } else {
                console.log('[doRender] 有category → 渲染问题列表');
                renderQuestionList(category);
            }
        }

        // ---- 工具函数 ----
        function getParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        // ---- 渲染：有 category 时的问题列表 ----
        function renderQuestionList(category) {
            try {
                var pathStr = getParam('path') || '';
                var path = pathStr ? pathStr.split('|') : [];
                var parentId = path.length > 0 ? path[path.length - 1] : null;

                console.log('[renderQL] START: category=' + category + ' | path=' + JSON.stringify(path) + ' | parentId=' + parentId);

            // 标题
            var typeObj = typesData.find(function(t) { return t.id === category; });
            var title = typeObj ? typeObj.name : '问题列表';
            var desc = '请选择您遇到的具体问题';

            if (parentId) {
                var parentQ = questionsData.find(function(q) { return q.id === parentId; });
                title = parentQ ? parentQ.title : '子目录';
                desc = '请选择子问题或文章';
            }

            titleEl.textContent = title;
            descEl.textContent = desc;
            inlineTip.style.display = 'none';

            // 当前层级的问题
            var items = questionsData.filter(function(q) {
                return q.typeId === category && q.parentId === parentId;
            }).sort(function(a, b) { return a.order - b.order; });

            console.log('[renderQL] 过滤结果: items.length=' + items.length);
            if (items.length > 0) {
                console.log('[renderQL] items:', items.map(function(q){return q.id+':'+q.title;}));
            }

            // 内联提示：根据实际数据动态生成
            var dirCount = items.filter(function(q) { return q.attribute === 'directory'; }).length;
            var artCount = items.filter(function(q) { return q.attribute === 'article'; }).length;
            if (dirCount > 0 || artCount > 0) {
                var tipText = '';
                if (dirCount > 0 && artCount > 0) {
                    tipText = '当前有 ' + dirCount + ' 个子目录和 ' + artCount + ' 篇解决方案文章，点击目录继续深入，点击文章查看详细步骤。';
                } else if (dirCount > 0) {
                    tipText = '当前有 ' + dirCount + ' 个子目录，请点击进入查看更多内容。';
                } else if (artCount > 0) {
                    tipText = '找到 ' + artCount + ' 篇相关解决方案，点击即可查看详细操作步骤。';
                }
                inlineTip.textContent = tipText;
                inlineTip.style.display = 'block';
            }

            if (items.length > 0) {
                var level = path.length;
                var fullHtml = items.map(function(q) {
                    return buildCard(q, level, category, path);
                }).join('');
                listEl.innerHTML = fullHtml;
            } else {
                listEl.innerHTML =
                    '<div class="empty-state">' +
                    '  <svg viewBox="0 0 24 24" fill="none" stroke="#7A5D38" stroke-width="1.5"><path d="M9 12h6"/><path d="M12 9v6"/><circle cx="12" cy="12" r="10"/></svg>' +
                    '  <p>该目录下暂无内容</p>' +
                    '</div>';
            }

            setupBackLink(category, path);
            } catch (e) {
                console.error('[renderQL] ERROR:', e.message, e.stack);
                titleEl.textContent = '渲染错误';
                descEl.textContent = category || '';
                inlineTip.style.display = 'none';
                listEl.innerHTML =
                    '<div class="empty-state">' +
                    '  <p style="color:red;font-weight:bold;">渲染异常</p>' +
                    '  <pre style="text-align:left;background:#fee;padding:10px;border-radius:4px;margin-top:8px;">' +
                    escapeHtml(e.stack || e.message || '') + '</pre>' +
                    '</div>';
            }
        }

        // ---- 渲染：无 category 时的类型选择 ----
        function renderTypeSelector() {
            titleEl.textContent = '选择问题类型';
            descEl.textContent = '请选择您需要查询的问题类型';
            inlineTip.textContent = '从下方卡片中选择问题类型，系统将为您展示对应的解决方案目录。';
            inlineTip.style.display = 'block';

            if (typesData.length > 0) {
                var cards = typesData.map(function(t, idx) {
                    var icons = ['<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>',
                                '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
                                '<circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6m9-9h-6m-6 0H3"/>'];
                    var icon = icons[idx % icons.length];
                    return '<a href="subquestion.html?category=' + encodeURIComponent(t.id) + '" class="type-card">' +
                        '<div class="type-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#7A5D38" stroke-width="2">' + icon + '</svg></div>' +
                        '<div class="type-card-name">' + escapeHtml(t.name) + '</div>' +
                        '<div class="type-card-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="#7A5D38" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>' +
                    '</a>';
                }).join('');

                listEl.innerHTML =
                    '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;">' + cards + '</div>';
            } else {
                renderError('暂无问题类型数据');
            }
        }

        // ---- 渲染：错误状态 ----
        function renderError(msg) {
            titleEl.textContent = '加载异常';
            descEl.textContent = '无法获取数据';
            inlineTip.style.display = 'none';
            listEl.innerHTML =
                '<div class="empty-state">' +
                '  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:#f59e0b;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12" y2="14"/></svg>' +
                '  <p style="color:#666;font-size:16px;margin-bottom:8px;">数据加载失败</p>' +
                '  <p style="color:#999;font-size:13px;margin-bottom:16px;">' + escapeHtml(msg) + '</p>' +
                '  <button onclick="location.reload()" style="padding:8px 20px;background:#7A5D38;color:white;border:none;border-radius:4px;cursor:pointer;">重新加载</button>' +
                '  &nbsp;<a href="index.html" style="padding:8px 20px;background:#f3f4f6;color:#374151;border-radius:4px;text-decoration:none;">返回首页</a>' +
                '</div>';
        }

        // ---- 构建卡片 HTML ----
        function buildCard(q, level, category, currentPath) {
            var isDir = q.attribute === 'directory';
            var iconPath = isDir
                ? '<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>'
                : '<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>';

            var cls = 'subquestion-card';
            if (level === 1) cls += ' child-card';
            else if (level >= 2) cls += ' grandchild-card';

            var newPath = currentPath.concat([q.id]).join('|');
            // 超链接文章直接跳转链接地址，其他走正常流程
            var url;
            if (!isDir && q.contentType === 'hyperlink' && q.hyperlink) {
                url = q.hyperlink;  // 直接跳转超链接
            } else if (isDir) {
                url = 'subquestion.html?category=' + category + '&path=' + newPath;
            } else {
                url = 'solution.html?category=' + category + '&question=' + q.id;
            }

            var tag = isDir ? '目录' : (q.contentType === 'hyperlink' ? '链接' : '文章');
            var hasChildren = isDir && questionsData.some(function(x) { return x.parentId === q.id; });
            var descText = isDir
                ? (hasChildren ? '点击查看子目录' : '')
                : (q.contentType === 'hyperlink' ? '点击直接跳转外部链接' : '点击查看详细解决方案');

            var isExternal = !isDir && q.contentType === 'hyperlink' && q.hyperlink;
            var targetAttr = isExternal ? ' target="_blank"' : '';

            return '<a href="' + url + '" class="' + cls + '" data-question-id="' + q.id + '"' + targetAttr + '>' +
                '<div class="subquestion-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' + iconPath + '</svg></div>' +
                '<div class="subquestion-content">' +
                '  <h3 class="subquestion-title">' + escapeHtml(q.title) + '<span class="subquestion-type-tag">' + tag + '</span></h3>' +
                (descText ? '<p class="subquestion-desc">' + descText + '</p>' : '') +
                '</div>' +
                '<div class="subquestion-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>' +
                '</a>';
        }

        // ---- 返回上级链接 ----
        function setupBackLink(category, path) {
            if (!backEl) return;
            if (path.length === 0) {
                backEl.style.display = 'none';
                return;
            }
            var parentPath = path.slice(0, -1).join('|');
            backEl.href = parentPath
                ? ('subquestion.html?category=' + category + '&path=' + parentPath)
                : ('subquestion.html?category=' + category);
            backEl.style.display = 'inline-flex';
        }

        // ---- HTML 转义 ----
        function escapeHtml(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }
    })();
    </script>
</body>
</html>
